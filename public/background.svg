<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#7c3aed" stroke-opacity="0.08" stroke-width="1.5" />
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#09090B" stop-opacity="1" />
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#09090B" stop-opacity="0" />
      <stop offset="100%" stop-color="#09090B" stop-opacity="1" />
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#fade)" />
  <rect width="1920" height="1080" fill="url(#grid)" />
  <!-- Przygaszenie boków (winieta) -->
  <rect width="1920" height="1080" fill="url(#center-glow)" />
</svg>
